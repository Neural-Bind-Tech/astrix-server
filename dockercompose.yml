services:
  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astrix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d astrix"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    container_name: server
    image: server
    build:
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    volumes:
      - app_log:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  app_log: